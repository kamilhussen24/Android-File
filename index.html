<!DOCTYPE html>
<html ⚡ lang="bn">
<head>
    <meta charset="utf-8">
    <script async src="https://cdn.ampproject.org/v0.js"></script>
    <script async custom-element="amp-date-display" src="https://cdn.ampproject.org/v0/amp-date-display-0.1.js"></script>
    <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>
    <style amp-custom>
        .bangla-date {
            font-family: 'SolaimanLipi', 'Bangla', Arial, sans-serif;
            direction: rtl; /* Helps with Bengali digit rendering */
            unicode-bidi: bidi-override;
            background: #f5f6fa;
            padding: 8px 12px;
            border-radius: 4px;
            display: inline-block;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <!-- AMP Date Display with Bengali Format -->
    <amp-date-display
        datetime="NOW"
        locale="bn"
        layout="fixed-height"
        height="40"
    >
        <template type="amp-mustache">
            <div class="bangla-date">
                তারিখ: {{day}} {{monthName}} {{year}} ইং
            </div>
        </template>
    </amp-date-display>

    <!-- For more detailed date/time -->
    <amp-date-display
        datetime="NOW"
        locale="bn"
        layout="fixed-height"
        height="60"
    >
        <template type="amp-mustache">
            <div class="bangla-date">
                {{dayName}}, {{day}} {{monthName}} {{year}}<br>
                সময়: {{hourTwoDigit}}:{{minuteTwoDigit}}:{{secondTwoDigit}}
            </div>
        </template>
    </amp-date-display>

    <!-- Include Bengali font (optional) -->
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
</body>
</html>
